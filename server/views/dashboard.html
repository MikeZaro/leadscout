<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadScout Dashboard</title>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border-color: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent-primary: #58a6ff;
      --accent-success: #3fb950;
      --accent-purple: #a371f7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 40px 20px;
      line-height: 1.6;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .nav-bar {
      margin-bottom: 20px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 500;
      padding: 10px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      transition: border-color 0.2s, color 0.2s;
    }

    .back-link:hover {
      border-color: var(--accent-primary);
      color: var(--accent-purple);
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 span {
      font-size: 2rem;
      -webkit-text-fill-color: initial;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }

    .stat-value {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .recent-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 30px;
    }

    .recent-section h2 {
      color: var(--text-primary);
      margin-bottom: 20px;
      font-size: 1.5rem;
    }

    .generations-list {
      list-style: none;
    }

    .generation-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .generation-item:last-child {
      border-bottom: none;
    }

    .prospect-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .prospect-name {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 1.1rem;
    }

    .prospect-company {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .generation-time {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .empty-state span {
      font-size: 3rem;
      display: block;
      margin-bottom: 16px;
    }

    .view-link {
      color: var(--accent-primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .view-link:hover {
      color: var(--accent-purple);
    }

    footer {
      text-align: center;
      margin-top: 40px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }
      
      .stat-value {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav-bar">
      <a href="/" class="back-link">← Back to App</a>
    </nav>

    <header>
      <h1><span>🎯</span> LeadScout Dashboard</h1>
      <p class="subtitle">AI-Powered Cold Email Personalization</p>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value">{{today}}</div>
        <div class="stat-label">Generated Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">{{allTime}}</div>
        <div class="stat-label">All Time</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">{{avgPerDay}}</div>
        <div class="stat-label">Avg Per Day</div>
      </div>
    </div>

    <div class="recent-section">
      <h2>Recent Generations</h2>
      <!-- GENERATIONS_LIST -->
    </div>

    <footer>
      <p>LeadScout v1.0.0 • Built for B2B Sales Pros</p>
    </footer>
  </div>
</body>
</html>
